<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>YouTube Lead Dashboard</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: '#3b82f6',
            secondary: '#6b7280',
          },
        },
      },
    };
  </script>
  <script src="{{ url_for('static', filename='script.js') }}" defer></script>
</head>
<body class="bg-gray-50 min-h-screen font-sans">
  <div class="max-w-7xl mx-auto p-4">
    <!-- Header -->
    <header class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900 mb-2">YouTube Lead Dashboard</h1>
      <p class="text-gray-600">Manage and send emails to your leads efficiently.</p>
    </header>

    <!-- Action Bar -->
    <div class="bg-white shadow-sm rounded-lg p-4 mb-6 flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4">
      <div class="flex items-center gap-4">
        <button id="send-all-btn" class="bg-primary text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition duration-200 disabled:bg-gray-300 disabled:cursor-not-allowed">
          Send All Unsent
        </button>
        <button id="send-selected-btn" class="bg-secondary text-white px-4 py-2 rounded-lg hover:bg-gray-700 transition duration-200 disabled:bg-gray-300 disabled:cursor-not-allowed">
          Send Selected (<span id="selected-count">0</span>)
        </button>
      </div>
      <input id="search-input" type="text" placeholder="Search by email or channel..." class="w-full sm:w-64 px-3 py-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-primary focus:border-transparent">
    </div>

    <!-- Leads Table -->
    <div class="bg-white shadow-sm rounded-lg overflow-hidden">
      <div id="loading-state" class="p-8 text-center text-gray-500 hidden">
        <div class="animate-spin rounded-full h-8 w-8 border-b-2 border-primary mx-auto mb-2"></div>
        Loading leads...
      </div>
      <div id="empty-state" class="p-8 text-center text-gray-500 hidden">
        No leads found. Try adjusting your search.
      </div>
      <table id="leads-table" class="w-full table-auto hidden">
        <thead class="bg-gray-50">
          <tr>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">
              <input type="checkbox" id="select-all" class="accent-primary">
            </th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Channel</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
            <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Action</th>
          </tr>
        </thead>
        <tbody id="lead-body" class="divide-y divide-gray-200">
          <!-- Rows populated by JS -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Toast Container -->
  <div id="toast-container" class="fixed top-4 right-4 z-50 space-y-2"></div>
</body>
</html>
